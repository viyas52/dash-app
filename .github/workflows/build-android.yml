name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android-companion/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      # Cache the debug keystore so every build signs with the same key.
      # First build creates ~/.android/debug.keystore; later builds restore it
      # from cache, so APK updates install over the old one without uninstall.
      - name: Cache debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-v1

      - name: Build debug APK
        working-directory: android-companion
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-companion-debug
          path: android-companion/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Publish to "android-latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Finance Companion — latest build
          body: |
            Latest debug APK for the Finance Companion Android app.
            Rebuilt automatically on every push to `android-companion/`.

            **Install on phone:**
            1. Download `app-debug.apk` below
            2. Tap it, allow install from unknown sources
            3. Open app, enter username + API key, enable notification access
          files: android-companion/app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
          make_latest: 'false'
