name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android-companion/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      # Generate a stable debug keystore on first run and commit it back to
      # the repo. From then on every build signs with the same key, so app
      # updates install over the old version without "App not installed".
      - name: Ensure stable debug keystore
        working-directory: android-companion/app
        run: |
          if [ ! -f debug.keystore ]; then
            keytool -genkey -v \
              -keystore debug.keystore \
              -storepass android -keypass android \
              -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Finance Companion,O=Personal,C=IN"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add debug.keystore
            git commit -m "Auto-add stable debug keystore [skip ci]"
            git push
          else
            echo "Stable debug keystore already present, using it."
          fi

      - name: Build debug APK
        working-directory: android-companion
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-companion-debug
          path: android-companion/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Publish to "android-latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Finance Companion — latest build
          body: |
            Latest debug APK for the Finance Companion Android app.
            Rebuilt automatically on every push to `android-companion/`.

            **Install on phone:**
            1. Download `app-debug.apk` below
            2. Tap it, allow install from unknown sources
            3. Open app, enter username + API key, enable notification access
          files: android-companion/app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
          make_latest: 'false'
